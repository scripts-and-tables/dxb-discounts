{% extends "base.html" %}

{% block title %}Check your email — DXB Discounts{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-12">
  <div class="card p-8 text-center">
    <div class="text-4xl mb-3">📧</div>
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Check your email</h1>
    <p class="text-sm text-slate-600">If an account exists with that email, you'll receive a reset link in a moment. The link expires in a few hours.</p>
    <a href="{% url 'accounts:login' %}" class="btn-ghost mt-6 inline-block">Back to sign in</a>
  </div>
</section>
{% endblock %}

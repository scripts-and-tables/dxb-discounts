{% comment %}
Brand logo for a Place, hot-linked from Clearbit with a Google favicon
fallback when Clearbit 404s (no images stored locally). Caller passes:
- place: the Place
- size_class: Tailwind sizing for the wrapper (e.g. "w-10 h-10")
{% endcomment %}
{% if place.website %}
<span class="{{ size_class }} shrink-0 rounded-md bg-white dark:bg-slate-100 border border-slate-200 dark:border-slate-700 overflow-hidden inline-flex items-center justify-center">
  <img src="{{ place.logo_url }}"
       onerror="this.onerror=null;this.src='{{ place.favicon_url }}';this.classList.add('p-1.5');"
       alt="{{ place.name }} logo"
       loading="lazy"
       class="max-w-full max-h-full object-contain">
</span>
{% endif %}

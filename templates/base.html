{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DXB Discounts — Save across Dubai{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}A directory of discounts across Dubai — restaurants, attractions, hotels, and more.{% endblock %}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏷️%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-slate-50 text-slate-900 antialiased; }
      a { @apply transition-colors; }
    }
    @layer components {
      .btn { @apply inline-flex items-center justify-center rounded-md px-4 py-2 font-medium; }
      .btn-primary { @apply btn bg-amber-500 text-white hover:bg-amber-600; }
      .btn-ghost { @apply btn bg-white border border-slate-200 hover:border-slate-300; }
      .chip { @apply inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700; }
      .chip-amber { @apply chip bg-amber-100 text-amber-900; }
      .card { @apply rounded-xl bg-white border border-slate-200 shadow-sm hover:shadow-md transition-shadow; }
      .field { @apply w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-amber-500 focus:outline-none focus:ring-1 focus:ring-amber-500; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="{% url 'pages:home' %}" class="flex items-center gap-2 text-lg font-bold text-slate-900 hover:text-amber-600">
        <span class="text-2xl">🏷️</span>
        <span>DXB Discounts</span>
      </a>
      <nav class="flex items-center gap-1 text-sm">
        <a href="{% url 'discounts:list' %}" class="px-3 py-2 rounded-md hover:bg-slate-100">Discounts</a>
        <a href="{% url 'places:list' %}" class="px-3 py-2 rounded-md hover:bg-slate-100">Places</a>
        <a href="{% url 'pages:about' %}" class="px-3 py-2 rounded-md hover:bg-slate-100 hidden sm:inline-block">About</a>
      </nav>
    </div>
  </header>

  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-200 bg-white mt-12">
    <div class="max-w-6xl mx-auto px-4 py-8 text-sm text-slate-500 flex flex-col sm:flex-row items-center justify-between gap-2">
      <p>&copy; {% now "Y" %} DXB Discounts. Always confirm offer details with the venue.</p>
      <div class="flex gap-4">
        <a href="{% url 'pages:about' %}" class="hover:text-slate-900">About</a>
        <a href="/sitemap.xml" class="hover:text-slate-900">Sitemap</a>
      </div>
    </div>
  </footer>
</body>
</html>

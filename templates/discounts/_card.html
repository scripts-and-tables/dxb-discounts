{# discount card. Expects: discount #}
<a href="{{ discount.get_absolute_url }}" class="card block p-5 group">
  <div class="flex items-start justify-between gap-3 mb-3">
    <span class="chip-amber text-sm font-bold">{{ discount.headline }}</span>
    {% if discount.is_featured %}<span class="chip bg-rose-100 text-rose-900">Featured</span>{% endif %}
  </div>
  <h3 class="font-semibold text-slate-900 group-hover:text-amber-700 line-clamp-2 mb-1">{{ discount.title }}</h3>
  <p class="text-sm text-slate-600 mb-3 line-clamp-2">{{ discount.description }}</p>
  <div class="flex items-center justify-between text-xs text-slate-500">
    <span class="truncate">{{ discount.place.name }}</span>
    <span class="ml-2 shrink-0">{{ discount.place.area }}</span>
  </div>
</a>
